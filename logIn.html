        <div class="signin">
      <a href="./logIn.html" class="active">Log In</a>

    </div>
        <i class="fa-solid fa-sun" aria-hidden="true"></i>
        <label class="profile-toggle-switch">
          <input type="checkbox" id="profile-theme-toggle" aria-label="Toggle dark mode" />
          <span class="profile-slider"></span>
        </label>
        <i class="fa-solid fa-moon" aria-hidden="true"></i>
        
      </div>

  </header>
    <div class="login-form">
        <div class="twoPages">
            <div class="main">
                <h2>Login</h2>
                <form action="" method="post" id="loginForm">
                    <label for="userName">Enter your gmail:</label>
                    <br>
                    <input type="text" name="" id="userName" placeholder="User Name" required>
                    <br>
                    <label for="userPass">Enter User Password:</label>
                    <br>
                    <input type="password" name="" id="userPass" placeholder="User Password" required>
                    <p id="error-msg" style="color: red; font-size: 13px; min-height: 20px;"></p>
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember Me</label>
                    </div>
                    <button class="btn" type="submit">login</button>
                    <button class="btn" type="reset">Reset</button> 
                </form>
                <br>
                <p class="account">Don't Have An Account <a href="sign-up.html">Register</a></p>
            </div>

        </div> 
    
    <script src="./js/sign-in.js"></script>
